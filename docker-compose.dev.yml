# Development: hot reload for backend + Vite dev server for frontend
# Usage: docker compose -f docker-compose.dev.yml up
services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://amanuo:amanuo@postgres:5432/amanuo
      REDIS_URL: redis://redis:6379/0
      BROADCASTER_URL: redis://redis:6379/0
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - redis
      - postgres

  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://app:8000
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: amanuo
      POSTGRES_USER: amanuo
      POSTGRES_PASSWORD: amanuo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  redis-data:
  pgdata:
  frontend-node-modules:
