server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API proxy to backend
    location /api/ { proxy_pass http://app:8000; }
    location /schemas/ { proxy_pass http://app:8000; }
    location /jobs/ { proxy_pass http://app:8000; }
    location /pipelines/ { proxy_pass http://app:8000; }
    location /batches/ { proxy_pass http://app:8000; }
    location /webhooks/ { proxy_pass http://app:8000; }
    location /extract/ { proxy_pass http://app:8000; }
    location /auth/ { proxy_pass http://app:8000; }
    location /workspaces/ { proxy_pass http://app:8000; }
    location /api-keys/ { proxy_pass http://app:8000; }
    location /health/ { proxy_pass http://app:8000; }

    # WebSocket support
    location /ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA fallback — serve index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
